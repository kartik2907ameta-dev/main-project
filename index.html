                    </a>
                  </div>

                  <div className="mt-8 grid grid-cols-2 sm:grid-cols-4 gap-3">
                    {[
                      { num: 'Custom', lbl: lang === 'hi' ? 'कस्टमाइजेशन' : 'Customization' },
                      { num: 'Safe', lbl: lang === 'hi' ? 'सेफ पैकिंग' : 'Safe Packing' },
                      { num: 'Royal', lbl: lang === 'hi' ? 'शाही फिनिशिंग' : 'Royal Finishing' },
                      { num: 'On-time', lbl: lang === 'hi' ? 'टाइम पर' : 'On-time Delivery' }
                    ].map((s, i) => (
                      <div key={i} className="rounded-2xl bg-white/60 border border-maroon/10 px-4 py-3">
                        <div className="text-maroon/95 font-extrabold">{s.num}</div>
                        <div className="text-xs text-maroon/70 mt-1">{s.lbl}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="relative">
                  <div className="rounded-3xl overflow-hidden border border-maroon/10 bg-white/60 shadow-royal">
                    <img src="./images/kalash-hero.jpg" alt="Kalash" className="w-full h-[420px] object-cover" />
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* PRODUCTS */}
          <section id="products" data-section className="py-14">
            <div className="max-w-6xl mx-auto px-4">
              <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-6">
                <div>
                  <h2 className="text-3xl font-extrabold text-maroon/95">{t.sections.productsTitle}</h2>
                  <p className="mt-3 text-maroon/80 text-lg max-w-2xl">{t.sections.productsDesc}</p>
                </div>
                <div className="text-sm text-maroon/70">{lang === 'hi' ? 'कस्टमाइजेशन उपलब्ध' : 'Customization available'}</div>
              </div>

              <div className="mt-10 grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {PRODUCTS.map((p) => (
                  <div key={p.key} className="rounded-3xl border border-maroon/10 bg-white/70 overflow-hidden">
                    <div className="h-56 overflow-hidden">
                      <img
                        src={p.img}
                        alt={p.name.en}
                        className="w-full h-full object-cover hover:scale-105 transition-transform duration-500"
                      />
                    </div>
                    <div className="p-5">
                      <div className="flex items-center justify-between gap-3">
                        <h3 className="font-bold text-maroon/95 text-lg">{lang === 'hi' ? p.name.hi : p.name.en}</h3>
                        <span className="px-3 py-1 rounded-full bg-maroon/5 text-maroon/80 border border-maroon/15 text-xs font-semibold">
                          {lang === 'hi' ? p.tag.hi : p.tag.en}
                        </span>
                      </div>
                      <p className="mt-3 text-sm text-maroon/80 leading-relaxed">{lang === 'hi' ? p.desc.hi : p.desc.en}</p>

                      <div className="mt-5">
                        <a
                          href={`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(lang === 'hi' ? `नमस्ते! मुझे “${p.name.hi}” चाहिए।` : `Hello! I want “${p.name.en}”.`)}`}
                          target="_blank"
                          rel="noreferrer"
                          className="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-2xl bg-maroon text-cream font-semibold"
                        >
                          <Icon name="whatsapp" className="w-5 h-5" />
                          {lang === 'hi' ? 'ऑर्डर करें' : 'Order via WhatsApp'}
                        </a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* ABOUT */}
          <section id="about" data-section className="py-14">
            <div className="max-w-6xl mx-auto px-4">
              <div className="grid lg:grid-cols-2 gap-10 items-center">
                <div>
                  <h2 className="text-3xl font-extrabold text-maroon/95">{t.sections.aboutTitle}</h2>
                  <p className="mt-3 text-maroon/80 text-lg">{t.sections.aboutDesc}</p>

                  <div className="mt-8 grid sm:grid-cols-3 gap-4">
                    {[
                      { k: 'handcrafted', icon: 'hand' },
                      { k: 'authentic', icon: 'award' },
                      { k: 'delivery', icon: 'shield-check' }
                    ].map((x) => (
                      <div key={x.k} className="rounded-3xl border border-maroon/10 bg-white/70 p-4">
                        <div className="w-11 h-11 rounded-2xl bg-maroon/5 text-maroon flex items-center justify-center">
                          <Icon name={x.icon} className="w-6 h-6" />
                        </div>
                        <div className="mt-3 font-semibold text-maroon/90">{t.aboutBadges[x.k]}</div>
                      </div>
                    ))}
                  </div>

                  <div className="mt-7 text-sm text-maroon/75 leading-relaxed">
                    <p>{t.trustCopy.p1}</p>
                    <p className="mt-2">{t.trustCopy.p2}</p>
                  </div>
                </div>

                <div className="relative">
                  <div className="rounded-3xl overflow-hidden border border-maroon/10 bg-white/60 shadow-royal">
                    <img src="./images/kalash-pair.jpg" alt="Kalash pair" className="w-full h-[420px] object-cover" />
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* GALLERY */}
          <section id="gallery" data-section className="py-14">
            <div className="max-w-6xl mx-auto px-4">
              <h2 className="text-3xl font-extrabold text-maroon/95">{t.sections.galleryTitle}</h2>
              <p className="mt-3 text-maroon/80 text-lg max-w-2xl">{t.sections.galleryDesc}</p>

              <div className="mt-10 grid md:grid-cols-3 gap-6">
                {[
                  { src: './images/kalash-mirror.jpg', label: lang === 'hi' ? 'मिरर & शिल्प' : 'Mirror & Craft' },
                  { src: './images/kalash-velvet.jpg', label: lang === 'hi' ? 'डिज़ाइनर' : 'Designer' },
                  { src: './images/kalash-hero.jpg', label: lang === 'hi' ? 'पारंपरिक' : 'Traditional' }
                ].map((g, i) => (
                  <div key={i} className="rounded-3xl overflow-hidden border border-maroon/10 bg-white/60">
                    <img src={g.src} alt={g.label} className="w-full h-64 object-cover" />
                    <div className="p-4">
                      <div className="text-sm font-semibold text-maroon/90">{g.label}</div>
                    </div>
                  </div>
                ))}
              </div>

              <div className="mt-8 rounded-3xl border border-maroon/10 bg-white/60 p-6 flex items-start gap-4">
                <div className="w-12 h-12 rounded-2xl bg-maroon/5 text-maroon flex items-center justify-center">
                  <Icon name="video" className="w-6 h-6" />
                </div>
                <div>
                  <div className="font-bold text-maroon/95">{t.gallery.comingSoon}</div>
                  <div className="text-sm text-maroon/75 mt-1">{t.gallery.comingSoonSub}</div>
                </div>
              </div>
            </div>
          </section>

          {/* FAQ */}
          <section className="py-14" aria-label="FAQ">
            <div className="max-w-6xl mx-auto px-4">
              <h2 className="text-3xl font-extrabold text-maroon/95">{t.sections.faqTitle}</h2>
              <div className="mt-8 grid gap-4">
                <AccordionItem title={t.faq.q1} isOpen={faqOpen === 'q1'} onToggle={() => setFaqOpen('q1')}>{t.faq.a1}</AccordionItem>
                <AccordionItem title={t.faq.q2} isOpen={faqOpen === 'q2'} onToggle={() => setFaqOpen('q2')}>{t.faq.a2}</AccordionItem>
                <AccordionItem title={t.faq.q3} isOpen={faqOpen === 'q3'} onToggle={() => setFaqOpen('q3')}>{t.faq.a3}</AccordionItem>
                <AccordionItem title={t.faq.q4} isOpen={faqOpen === 'q4'} onToggle={() => setFaqOpen('q4')}>{t.faq.a4}</AccordionItem>
              </div>
            </div>
          </section>

          {/* CONTACT */}
          <section id="contact" data-section className="py-14">
            <div className="max-w-6xl mx-auto px-4">
              <div className="grid lg:grid-cols-2 gap-10 items-start">
                <div>
                  <h2 className="text-3xl font-extrabold text-maroon/95">{t.sections.contactTitle}</h2>
                  <p className="mt-3 text-maroon/80 text-lg">{t.sections.contactDesc}</p>

                  <div className="mt-6 space-y-3 text-maroon/80">
                    <div className="flex items-center gap-3">
                      <div className="w-11 h-11 rounded-2xl bg-maroon/5 text-maroon flex items-center justify-center">
                        <Icon name="phone" className="w-6 h-6" />
                      </div>
                      <div>
                        <div className="font-semibold">{t.contact.mapHint}</div>
                        <div className="text-sm">{t.footer.address}</div>
                      </div>
                    </div>
                    <div className="flex items-center gap-3">
                      <div className="w-11 h-11 rounded-2xl bg-maroon/5 text-maroon flex items-center justify-center">
                        <Icon name="message-circle" className="w-6 h-6" />
                      </div>
                      <div>
                        <div className="font-semibold">WhatsApp</div>
                        <div className="text-sm">+91 {WHATSAPP_NUM}</div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="rounded-3xl border border-maroon/10 bg-white/70 p-6">
                  <form onSubmit={onSubmitWhatsApp} className="space-y-4">
                    <div className="grid sm:grid-cols-2 gap-4">
                      <label className="block">
                        <div className="text-sm font-semibold text-maroon/85">{t.contact.name}</div>
                        <input
                          value={form.name}
                          onChange={(e) => setForm((p) => ({ ...p, name: e.target.value }))}
                          className="mt-2 w-full px-4 py-3 rounded-2xl border border-maroon/15 bg-cream/40 outline-none focus:ring-2 focus:ring-maroon/20"
                          placeholder={lang === 'hi' ? 'अपना नाम' : 'Your name'}
                          required
                        />
                      </label>
                      <label className="block">
                        <div className="text-sm font-semibold text-maroon/85">{t.contact.phone}</div>
                        <input
                          value={form.phone}
                          onChange={(e) => setForm((p) => ({ ...p, phone: e.target.value }))}
                          className="mt-2 w-full px-4 py-3 rounded-2xl border border-maroon/15 bg-cream/40 outline-none focus:ring-2 focus:ring-maroon/20"
                          placeholder={lang === 'hi' ? 'फोन नंबर' : 'Phone number'}
                          required
                        />
                      </label>
                    </div>

                    <label className="block">
                      <div className="text-sm font-semibold text-maroon/85">{t.contact.message}</div>
                      <textarea
                        value={form.message}
                        onChange={(e) => setForm((p) => ({ ...p, message: e.target.value }))}
                        className="mt-2 w-full min-h-[120px] px-4 py-3 rounded-2xl border border-maroon/15 bg-cream/40 outline-none focus:ring-2 focus:ring-maroon/20"
                        placeholder={lang === 'hi' ? 'इवेंट डेट, मात्रा, और पसंदीदा स्टाइल लिखें' : 'Write event date, quantity, and preferred style'}
                        required
                      />
                    </label>

                    <button type="submit" className="w-full inline-flex items-center justify-center gap-2 px-5 py-3 rounded-2xl bg-maroon text-cream font-semibold shadow-royal">
                      <Icon name="whatsapp" className="w-5 h-5" />
                      {t.contact.send}
                    </button>

                    <div className="text-xs text-maroon/65 leading-relaxed">
                      {lang === 'hi' ? 'क्लिक करते ही WhatsApp चैट खुल जाएगी।' : 'Clicking will open your WhatsApp chat with the message.'}
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </section>

          <footer className="py-10 border-t border-maroon/10">
            <div className="max-w-6xl mx-auto px-4">
              <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
                <div>
                  <div className="font-bold text-maroon/95">{t.footer.tagline}</div>
                  <div className="text-sm text-maroon/70 mt-2">{t.footer.address}</div>
                  <div className="text-sm text-maroon/70 mt-1">{t.footer.phone}</div>
                </div>
                <div className="flex gap-3">
                  <a href="#" className="w-11 h-11 rounded-2xl border border-maroon/15 bg-white/60 text-maroon flex items-center justify-center inline-flex" aria-label="Instagram">
                    <Icon name="instagram" className="w-6 h-6" />
                  </a>
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
